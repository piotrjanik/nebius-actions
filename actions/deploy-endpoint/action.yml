name: 'Nebius Deploy Endpoint'
description: >-
  Create a Nebius Endpoint (via the Nebius SDK) and poll until it is serving.
  Note: the API has no update verb — if an endpoint with the same name already
  exists it is returned as-is and NOT updated.
author: 'Nebius Actions'
branding:
  icon: 'globe'
  color: 'blue'

inputs:
  name:
    description: 'Endpoint name (required).'
    required: true
  image:
    description: 'Container image to serve (required).'
    required: true
  port:
    description: 'Container port the served process listens on.'
    required: false
  public:
    description: 'Assign a public IP / expose a public URL.'
    required: false
    default: 'false'
  token:
    description: >-
      Bearer token required to access the served endpoint (set as the endpoint
      authToken). Registered as a secret and masked; never echoed as an output.
    required: false
  preset:
    description: 'Compute preset (e.g. 1gpu-16vcpu-200gb).'
    required: false
  platform:
    description: 'Compute platform.'
    required: false
  env:
    description: 'Environment variables as multiline KEY=VALUE pairs.'
    required: false
  wait:
    description: 'Wait until the endpoint is serving.'
    required: false
    default: 'true'
  timeout:
    description: 'Maximum seconds to poll before failing.'
    required: false
    default: '3600'
  poll-interval:
    description: 'Seconds between status polls.'
    required: false
    default: '10'
  project-id:
    description: 'Nebius project id (the endpoint parent).'
    required: false

outputs:
  endpoint-id:
    description: 'The endpoint id.'
  url:
    description: 'The public HTTPS URL (when reported).'
  status:
    description: 'The final endpoint status.'

runs:
  using: 'node24'
  main: 'dist/index.js'
