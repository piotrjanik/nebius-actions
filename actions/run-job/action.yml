name: 'Nebius Run Job'
description: >-
  Create a Nebius Job, stream its logs, poll to a terminal state, and fail the
  step on a non-success status or timeout. Authenticates via the SDK — run the
  `auth` action first (exports NEBIUS_IAM_TOKEN).
author: 'Nebius Actions'
branding:
  icon: 'play'
  color: 'blue'

inputs:
  image:
    description: 'Container image to run (required).'
    required: true
  name:
    description: 'Job name.'
    required: false
  command:
    description: >-
      Container command, one whitespace-separated token per line. Tokens are
      joined with a single space into the CLI --container-command value, so a
      single token must not contain spaces (put each argument on its own line).
    required: false
  preset:
    description: 'Compute preset (e.g. 1gpu-16vcpu-200gb).'
    required: false
  platform:
    description: 'Compute platform.'
    required: false
  env:
    description: 'Environment variables as multiline KEY=VALUE pairs.'
    required: false
  mounts:
    description: 'Mounts (multiline; one entry per line).'
    required: false
  timeout:
    description: "The Job's own run timeout (e.g. 1h, 30m)."
    required: false
  args:
    description: 'Container args string passed to the entrypoint (e.g. -c "cmd").'
    required: false
  disk-size:
    description: 'Main disk size (binary units, e.g. 250Gi). Omit for the platform default.'
    required: false
  disk-type:
    description: 'Disk type: network-ssd (default), network-hdd, network-ssd-non-replicated, network-ssd-io-m3.'
    required: false
    default: 'network-ssd'
  preemptible:
    description: 'Run on preemptible compute.'
    required: false
    default: 'false'
  wait:
    description: 'Wait for the job to reach a terminal state.'
    required: false
    default: 'true'
  poll-interval:
    description: 'Seconds between status polls.'
    required: false
    default: '10'
  project-id:
    description: 'Nebius project id.'
    required: false

outputs:
  job-id:
    description: 'The created job id.'
  status:
    description: 'The final job status.'
  exit-code:
    description: 'The container exit code (when reported).'

runs:
  using: 'node24'
  main: 'dist/index.js'
