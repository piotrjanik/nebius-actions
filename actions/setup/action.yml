name: 'Nebius Setup'
description: >-
  Install + cache the nebius CLI and put it on PATH. Run once per job before any
  resource action. Authentication is handled separately by the `auth` action.
author: 'Nebius Actions'
branding:
  icon: 'download'
  color: 'blue'

inputs:
  cli-version:
    description: 'nebius CLI version to install (`latest` or a pinned version).'
    required: false
    default: 'latest'
  install-cli:
    description: 'Whether to install the nebius CLI.'
    required: false
    default: 'true'
  region:
    description: 'Region/profile prefix.'
    required: false
    default: 'eu'

runs:
  using: 'node24'
  main: 'dist/index.js'
