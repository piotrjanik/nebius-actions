name: 'Nebius Auth'
description: >-
  Authenticate to Nebius and export the masked IAM token as NEBIUS_IAM_TOKEN for
  the CLI and all downstream steps. Two methods: keyless GitHub OIDC token
  exchange (default) or a service-account authorized key. Run once per job. Does
  not install the CLI (see `setup`).
author: 'Nebius Actions'
branding:
  icon: 'log-in'
  color: 'blue'

inputs:
  service-account-id:
    description: >-
      Nebius service account (`serviceaccount-…`) to authenticate as. Required:
      for `oidc` it is the impersonated subject of the token exchange; for `key`
      it is the account the authorized key belongs to.
    required: true
  auth-method:
    description: 'Authentication method: `oidc` (keyless, default) or `key`.'
    required: false
    default: 'oidc'
  public-key-id:
    description: >-
      Required for `auth-method: key`. Id of the registered public key (the
      signed JWT `kid`) of the service-account authorized key.
    required: false
  private-key:
    description: >-
      Required for `auth-method: key`. PEM-encoded private key half of the
      authorized key. Pass from a secret; it is masked and never echoed.
    required: false
  audience:
    description: 'Optional OIDC audience claim (`auth-method: oidc` only).'
    required: false
  domain:
    description: 'Optional Nebius API domain override (default: api.nebius.cloud:443).'
    required: false

outputs:
  expires-in:
    description: 'IAM token lifetime in seconds.'
    # Note: the IAM token itself is NOT exposed as an output. Downstream steps
    # read it from the NEBIUS_IAM_TOKEN environment variable, which the action
    # exports (masked) for the rest of the job.

runs:
  using: 'node24'
  main: 'dist/index.js'
