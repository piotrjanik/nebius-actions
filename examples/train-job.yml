# Run a training Job on Nebius AI Cloud and wait for it to finish.
#
# `setup` installs + caches the `nebius` CLI. `auth` authenticates via GitHub
# OIDC (keyless) and exports the Nebius IAM token. `run-job` submits the Job,
# streams its logs, waits for a terminal state, and fails the step if the Job
# did not complete successfully.
#
# Replace OWNER/REPO with the repo hosting these actions, and the image/preset
# with your own.
name: train-job

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        default: '1'

# Required for keyless OIDC auth: lets `auth` mint a GitHub OIDC token.
permissions:
  id-token: write
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install + cache the nebius CLI.
      - name: Set up Nebius
        uses: OWNER/REPO/actions/setup@v0
        # All inputs below are optional; defaults shown for reference.
        # with:
        #   cli-version: latest
        #   region: eu

      # Exchange GitHub OIDC -> Nebius IAM token and export it for later steps.
      - name: Authenticate to Nebius
        uses: OWNER/REPO/actions/auth@v0
        with:
          service-account-id: ${{ vars.NEBIUS_SERVICE_ACCOUNT_ID }}
          # audience: ""   # set only if your federation requires an audience
          # domain: api.nebius.cloud:443

      - name: Run training job
        id: train
        uses: OWNER/REPO/actions/run-job@v0
        with:
          name: trainer-${{ github.run_id }}
          image: cr.eu-north1.nebius.cloud/your-project/trainer:latest
          preset: 1gpu-16vcpu-200gb
          # One token per line; joined into the container command.
          command: |
            python
            train.py
            --epochs
            ${{ inputs.epochs }}
          # KEY=VALUE per line; blank lines and # comments ignored.
          env: |
            WANDB_PROJECT=demo
            LOG_LEVEL=info
          # The Job's own run timeout (passed to the CLI).
          timeout: 2h
          # Stream logs + wait for the Job to reach a terminal state (default true).
          wait: true
          poll-interval: 10
          # project-id: <your-project-id>   # omit to use the CLI default project
          # extra-args: |                    # raw passthrough to `nebius ai job create`
          #   --some-flag value

      # Pass step outputs through env vars (not ${{ }} inlined into the script)
      # so values expand in the shell — the injection-safe pattern.
      - name: Report result
        env:
          JOB_ID: ${{ steps.train.outputs.job-id }}
          STATUS: ${{ steps.train.outputs.status }}
          EXIT_CODE: ${{ steps.train.outputs.exit-code }}
        run: |
          echo "Job ID:    $JOB_ID"
          echo "Status:    $STATUS"
          echo "Exit code: $EXIT_CODE"
