# Demo: the Endpoint lifecycle — deploy-endpoint -> wait-for-endpoint, with a
# gated delete-endpoint teardown.
#
# Endpoints use @nebius/js-sdk over gRPC, so this workflow does NOT need `setup`
# (the CLI is only for Jobs). Uses THIS repo's actions by LOCAL path.
# `deploy` runs with wait:false to showcase the explicit wait-for-endpoint poll;
# `run-job`/`deploy-endpoint` can also wait inline.
#
# Auth: this demo does NOT use OIDC. Provide a Nebius IAM token directly as the
# `NEBIUS_IAM_TOKEN` secret (short-lived — rotate as needed); the SDK reads it
# straight from the environment, so no `auth` action runs.
#
# Requires:
#   secrets.NEBIUS_IAM_TOKEN    - a Nebius IAM token (required)
#   vars.NEBIUS_ENDPOINT_IMAGE  - a servable container image (optional; has a default)
#   vars.NEBIUS_PROJECT_ID      - parent project (optional)
name: demo-endpoint-lifecycle

on:
  workflow_dispatch:
    inputs:
      preset:
        description: 'Compute preset'
        default: '1gpu-16vcpu-200gb'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Static IAM token instead of OIDC. Auto-masked as a GitHub secret; the
      # nebius SDK reads NEBIUS_IAM_TOKEN straight from the environment.
      NEBIUS_IAM_TOKEN: ${{ secrets.NEBIUS_IAM_TOKEN }}
    # Step outputs do NOT propagate to needs.<job>.outputs automatically; the
    # job must re-export them so the teardown job can read the endpoint id.
    outputs:
      endpoint-id: ${{ steps.deploy.outputs.endpoint-id }}
    steps:
      - uses: actions/checkout@v4

      # 1) Create the endpoint and return immediately (wait:false).
      - name: Deploy endpoint
        id: deploy
        uses: ./actions/deploy-endpoint
        with:
          name: demo-endpoint-${{ github.run_id }}
          image: ${{ vars.NEBIUS_ENDPOINT_IMAGE || 'cr.eu-north1.nebius.cloud/examples/serve:latest' }}
          port: 8080
          public: true
          preset: ${{ inputs.preset }}
          env: |
            MODEL_NAME=demo
            LOG_LEVEL=info
          wait: false
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}

      # 2) Explicitly poll until the endpoint is serving.
      - name: Wait for endpoint
        id: wait
        uses: ./actions/wait-for-endpoint
        with:
          endpoint-id: ${{ steps.deploy.outputs.endpoint-id }}
          poll-interval: 10
          timeout: 30m

      - name: Show URL
        env:
          ENDPOINT_ID: ${{ steps.deploy.outputs.endpoint-id }}
          STATUS: ${{ steps.wait.outputs.status }}
          URL: ${{ steps.wait.outputs.url }}
        run: |
          echo "Endpoint ID: $ENDPOINT_ID"
          echo "Status:      $STATUS"
          echo "URL:         $URL"

      - name: Smoke test
        env:
          URL: ${{ steps.wait.outputs.url }}
        run: curl -fsS "$URL/health"

  # Teardown always runs after deploy (even on failure) so demos don't leak a
  # paid endpoint. Gate behind an Environment that requires approval if you want
  # a manual confirmation before deletion.
  teardown:
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.outputs.endpoint-id != ''
    env:
      NEBIUS_IAM_TOKEN: ${{ secrets.NEBIUS_IAM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Delete endpoint
        uses: ./actions/delete-endpoint
        with:
          endpoint-id: ${{ needs.deploy.outputs.endpoint-id }}
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}
