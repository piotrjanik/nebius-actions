# Demo: the low-level Job lifecycle — submit-job -> wait-for-job, with
# cancel-job wired to workflow cancellation.
#
# Splitting submit from wait is what enables matrix fan-out, manual gating
# between the two, and a clean cancel when the run itself is cancelled. Uses
# THIS repo's actions by LOCAL path (./actions/...).
#
# Requires:
#   vars.NEBIUS_SERVICE_ACCOUNT_ID  - the SA the federated credential trusts
#   vars.NEBIUS_JOB_IMAGE           - a runnable container image (optional; has a default)
#   vars.NEBIUS_PROJECT_ID          - parent project (optional)
name: demo-job-lifecycle

on:
  workflow_dispatch:
    inputs:
      preset:
        description: 'Compute preset'
        default: 'cpu-4vcpu-16gb'

permissions:
  id-token: write
  contents: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nebius
        uses: ./actions/setup

      - name: Authenticate to Nebius
        uses: ./actions/auth
        with:
          service-account-id: ${{ vars.NEBIUS_SERVICE_ACCOUNT_ID }}

      # 1) Submit and return immediately (no waiting).
      - name: Submit job
        id: submit
        uses: ./actions/submit-job
        with:
          name: demo-batch-${{ github.run_id }}
          image: ${{ vars.NEBIUS_JOB_IMAGE || 'cr.eu-north1.nebius.cloud/examples/hello:latest' }}
          preset: ${{ inputs.preset }}
          command: |
            python
            batch.py
          env: |
            BATCH_SIZE=512
          timeout: 1h
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}

      # (Optional) Other work / approval gates could go here while the Job runs.

      # 2) Wait for the submitted Job to reach a terminal state, streaming logs.
      #    Fails the step on FAILED/CANCELLED or timeout.
      - name: Wait for job
        id: wait
        uses: ./actions/wait-for-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}
          stream-logs: true
          poll-interval: 10
          timeout: 1h

      - name: Report result
        env:
          JOB_ID: ${{ steps.submit.outputs.job-id }}
          STATUS: ${{ steps.wait.outputs.status }}
          EXIT_CODE: ${{ steps.wait.outputs.exit-code }}
        run: |
          echo "Job ID:    $JOB_ID"
          echo "Status:    $STATUS"
          echo "Exit code: $EXIT_CODE"

      # 3) If the run is cancelled, cancel the Nebius Job too. `if: cancelled()`
      #    runs this step even though earlier steps were interrupted.
      - name: Cancel job on workflow cancellation
        if: cancelled() && steps.submit.outputs.job-id != ''
        uses: ./actions/cancel-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}
