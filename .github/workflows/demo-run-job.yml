# Demo: the split Job path — setup -> submit-job -> wait-for-job — running a
# real LoRA fine-tune with Axolotl on a Nebius GPU.
#
# Adapted from the Nebius serverless-ai-cookbook:
#   https://github.com/nebius/serverless-ai-cookbook/tree/main/training/axolotl-finetuning
#
# It QLoRA-fine-tunes Qwen/Qwen2.5-0.5B on a wikitext slice for 30 steps, then
# exits. `submit-job` creates the Job and returns; `wait-for-job` streams its
# logs, polls to a terminal state, and fails the step if the Job did not
# succeed. (The all-in-one `run-job` action fuses these two into one step.)
#
# This workflow owns the bucket lifecycle: it CREATES a fresh per-run bucket,
# uploads the inlined Axolotl config to it, mounts it read-WRITE into the job at
# /workspace/data (so adapters persist into the bucket under output/), trains,
# VERIFIES the output artifacts exist (check-object), and DELETES the bucket on
# cleanup (always, even on failure). The upload mints a short-lived S3 access key
# from the service account (secret -> MysteryBox); no new GitHub secret is needed.
#
# Auth: service-account key (NOT OIDC). Jobs use the `nebius` CLI, so `setup`
# configures a key-based CLI profile (the `auth` action only exports a token for
# the SDK path — endpoints; the CLI needs its own ~/.nebius/config.yaml).
#
# Requires:
#   vars.NEBIUS_SERVICE_ACCOUNT_ID  - the SA the key belongs to
#   vars.NEBIUS_PUBLIC_KEY_ID       - the authorized key's public key id
#   secrets.NEBIUS_PRIVATE_KEY      - the authorized key's PEM private key
#   vars.NEBIUS_TENANT_ID           - the tenant (for the CLI profile)
#   vars.NEBIUS_JOB_IMAGE           - Axolotl image (optional; has a default)
#   vars.NEBIUS_PROJECT_ID          - parent project (optional; CLI default used if unset)
name: demo-run-job

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Compute platform'
        default: 'gpu-l40s-a'
      preset:
        description: 'Compute preset'
        default: '1gpu-8vcpu-32gb'
      disk-size:
        description: 'Job disk size'
        default: '250Gi'

permissions:
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    steps:
      # Local action refs (./actions/...) only resolve after the repo is checked
      # out into the workspace.
      - uses: actions/checkout@v4

      # Write the Axolotl config inline so this workflow is the single source of
      # truth, then hand the file to upload-object.
      - name: Write Axolotl config
        run: |
          mkdir -p "$RUNNER_TEMP"
          cat > "$RUNNER_TEMP/config.yaml" <<'YAML'
          base_model: Qwen/Qwen2.5-0.5B

          load_in_4bit: true
          adapter: qlora

          datasets:
            - path: Salesforce/wikitext
              name: wikitext-2-raw-v1
              split: "train[:2000]"
              type: completion
              field: text

          sequence_len: 128
          micro_batch_size: 1
          gradient_accumulation_steps: 1

          learning_rate: 2e-4
          max_steps: 30
          val_set_size: 0
          logging_steps: 5

          dataset_prepared_path: /tmp/output/last_run_prepared
          output_dir: /workspace/data/output

          lora_r: 8
          lora_alpha: 16
          lora_dropout: 0.05
          lora_target_modules:
            - q_proj
            - k_proj
            - v_proj
            - o_proj
            - gate_proj
            - up_proj
            - down_proj
          YAML

      # Install the CLI and configure a key-based profile so the CLI can
      # authenticate itself (jobs drive the CLI). The private key comes from a
      # secret; setup masks it and writes it to a 0600 file under RUNNER_TEMP.
      - name: Set up Nebius
        uses: ./actions/setup
        with:
          service-account-id: ${{ vars.NEBIUS_SERVICE_ACCOUNT_ID }}
          public-key-id: ${{ vars.NEBIUS_PUBLIC_KEY_ID }}
          private-key: ${{ secrets.NEBIUS_PRIVATE_KEY }}
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}
          tenant-id: ${{ vars.NEBIUS_TENANT_ID }}

      # Create a fresh per-run bucket to hold the config and the trained adapters.
      # project-id / service-account-id come from `setup` (exported as
      # NEBIUS_PROJECT_ID / NEBIUS_SERVICE_ACCOUNT_ID), so the resource steps
      # below need not repeat them.
      - name: Create bucket
        id: bucket
        uses: ./actions/create-bucket
        with:
          name: demo-axolotl-${{ github.run_id }}

      # Upload the config to the bucket. Mints a short-lived S3 key from the SA
      # (secret -> MysteryBox) and returns the object URI + mount secret id.
      - name: Upload Axolotl config
        id: upload
        uses: ./actions/upload-object
        with:
          source: ${{ runner.temp }}/config.yaml
          bucket: ${{ steps.bucket.outputs.bucket-name }}
          key: config.yaml

      # 1) Create the Job. `nebius ai job create` blocks until the job is
      #    provisioned (no async flag), so this step finishes once the job is up
      #    and RUNNING, returning its id — it does NOT wait for completion.
      - name: Submit Axolotl fine-tune
        id: submit
        uses: ./actions/submit-job
        with:
          name: demo-axolotl-${{ github.run_id }}
          image: ${{ vars.NEBIUS_JOB_IMAGE || 'docker.io/axolotlai/axolotl:main-20260309-py3.11-cu128-2.9.1' }}
          platform: ${{ inputs.platform }}
          preset: ${{ inputs.preset }}
          # `bash` is the container entrypoint; the actual script is passed as
          # `--args` below so the container expands the pipeline itself.
          command: bash
          # The Job's own run timeout (passed to the CLI as --timeout).
          timeout: 1h
          # Mount the bucket by its id. Nebius resolves the job's access to the
          # bucket from the project/service account — no S3 credentials, profile,
          # or MysteryBox secret are needed on the `--volume` (that `s3://…:default@…`
          # form requires a pre-configured AWS profile and is not what we want here).
          mounts: ${{ steps.bucket.outputs.bucket-id }}:/workspace/data:rw
          # Raw passthrough to `nebius ai job create`: bigger disk for the model +
          # dataset cache, then the container args. Nebius space-splits the single
          # --args string (honoring the quotes), so the whole `-c "..."` reaches
          # bash intact; $-expansions happen container-side, not on the runner.
          #
          # `--format json` MUST come before `--args`: the CLI's `--args` is
          # variadic and swallows every following token, so a trailing
          # `--format json` (which the action would otherwise auto-append) gets
          # eaten and the CLI emits its human table instead of JSON — which the
          # action then fails to parse. Setting it here also suppresses the
          # auto-append (the action skips it when `--format` is already present).
          extra-args: |
            --disk-size
            ${{ inputs.disk-size }}
            --preemptible
            --format
            json
            --args
            -c "axolotl train /workspace/data/config.yaml"

      # 2) Now that the job is provisioned, poll its status to a terminal state,
      #    streaming logs. Fails the step on FAILED/CANCELLED or poll timeout.
      #    `timeout` here is a poll ceiling in SECONDS (vs the submit `timeout`
      #    above, which is the Job's own run timeout).
      - name: Wait for fine-tune
        id: wait
        uses: ./actions/wait-for-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}
          stream-logs: true
          poll-interval: 10
          timeout: 3600

      # Verify the fine-tune actually wrote adapters into the bucket.
      - name: Verify model artifacts
        id: check
        uses: ./actions/check-object
        with:
          bucket: ${{ steps.bucket.outputs.bucket-name }}
          prefix: output/

      # 3) If the run is cancelled, cancel the Nebius Job too.
      - name: Cancel job on workflow cancellation
        if: cancelled() && steps.submit.outputs.job-id != ''
        uses: ./actions/cancel-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}

      # Clean up: empty + delete the bucket. Runs even on failure/cancellation,
      # but only if the bucket was actually created.
      - name: Delete bucket
        if: always() && steps.bucket.outputs.bucket-id != ''
        uses: ./actions/delete-bucket
        with:
          bucket: ${{ steps.bucket.outputs.bucket-name }}
          bucket-id: ${{ steps.bucket.outputs.bucket-id }}

      # Read step outputs via env (not ${{ }} inlined into the script body) so
      # values expand in the shell — the injection-safe pattern.
      - name: Report result
        env:
          JOB_ID: ${{ steps.submit.outputs.job-id }}
          STATUS: ${{ steps.wait.outputs.status }}
          EXIT_CODE: ${{ steps.wait.outputs.exit-code }}
        run: |
          echo "Job ID:    $JOB_ID"
          echo "Status:    $STATUS"
          echo "Exit code: $EXIT_CODE"
