# Demo: the split Job path — setup -> submit-job -> wait-for-job — running a
# real LoRA fine-tune with Axolotl on a Nebius GPU.
#
# Adapted from the Nebius serverless-ai-cookbook:
#   https://github.com/nebius/serverless-ai-cookbook/tree/main/training/axolotl-finetuning
#
# It QLoRA-fine-tunes Qwen/Qwen2.5-0.5B on a wikitext slice for 30 steps, then
# exits. `submit-job` creates the Job and returns; `wait-for-job` streams its
# logs, polls to a terminal state, and fails the step if the Job did not
# succeed. (The all-in-one `run-job` action fuses these two into one step.)
#
# No bucket needed: the Axolotl `config.yaml` (examples/axolotl/config.yaml) is
# base64-embedded into the container command, so the job needs NO Object Storage
# bucket and NO S3 credentials. Trade-off: adapters write to ephemeral container
# disk (/tmp/output). To persist them, create a bucket, add a
# `mounts: <bucket-id>:/workspace/data` input, and point output_dir there.
#
# Auth: service-account key (NOT OIDC). Jobs use the `nebius` CLI, so `setup`
# configures a key-based CLI profile (the `auth` action only exports a token for
# the SDK path — endpoints; the CLI needs its own ~/.nebius/config.yaml).
#
# Requires:
#   vars.NEBIUS_SERVICE_ACCOUNT_ID  - the SA the key belongs to
#   vars.NEBIUS_PUBLIC_KEY_ID       - the authorized key's public key id
#   secrets.NEBIUS_PRIVATE_KEY      - the authorized key's PEM private key
#   vars.NEBIUS_TENANT_ID           - the tenant (for the CLI profile)
#   vars.NEBIUS_JOB_IMAGE           - Axolotl image (optional; has a default)
#   vars.NEBIUS_PROJECT_ID          - parent project (optional; CLI default used if unset)
name: demo-run-job

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Compute platform'
        default: 'gpu-l40s-a'
      preset:
        description: 'Compute preset'
        default: '1gpu-8cpu-32gb'
      disk-size:
        description: 'Job disk size'
        default: '250Gi'

permissions:
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    steps:
      # Local action refs (./actions/...) only resolve after the repo is checked
      # out into the workspace.
      - uses: actions/checkout@v4

      # Encode the vendored Axolotl config so it can travel inside the container
      # command — keeps examples/axolotl/config.yaml the single readable source.
      - name: Encode Axolotl config
        id: cfg
        run: echo "b64=$(base64 -w0 examples/axolotl/config.yaml)" >> "$GITHUB_OUTPUT"

      # Install the CLI and configure a key-based profile so the CLI can
      # authenticate itself (jobs drive the CLI). The private key comes from a
      # secret; setup masks it and writes it to a 0600 file under RUNNER_TEMP.
      - name: Set up Nebius
        uses: ./actions/setup
        with:
          service-account-id: ${{ vars.NEBIUS_SERVICE_ACCOUNT_ID }}
          public-key-id: ${{ vars.NEBIUS_PUBLIC_KEY_ID }}
          private-key: ${{ secrets.NEBIUS_PRIVATE_KEY }}
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}
          tenant-id: ${{ vars.NEBIUS_TENANT_ID }}

      # 1) Create the Job. `nebius ai job create` blocks until the job is
      #    provisioned (no async flag), so this step finishes once the job is up
      #    and RUNNING, returning its id — it does NOT wait for completion.
      - name: Submit Axolotl fine-tune
        id: submit
        uses: ./actions/submit-job
        with:
          name: demo-axolotl-${{ github.run_id }}
          image: ${{ vars.NEBIUS_JOB_IMAGE || 'docker.io/axolotlai/axolotl:main-20260309-py3.11-cu128-2.9.1' }}
          platform: ${{ inputs.platform }}
          preset: ${{ inputs.preset }}
          # `bash` is the container entrypoint; the actual script is passed as
          # `--args` below so the container expands the pipeline itself.
          command: bash
          # The Job's own run timeout (passed to the CLI as --timeout).
          timeout: 1h
          project-id: ${{ vars.NEBIUS_PROJECT_ID }}
          # Raw passthrough to `nebius ai job create`: bigger disk for the model +
          # dataset cache, then the container args. Nebius space-splits the single
          # --args string (honoring the quotes), so the whole `-c "..."` reaches
          # bash intact; $-expansions happen container-side, not on the runner.
          extra-args: |
            --disk-size
            ${{ inputs.disk-size }}
            --preemptible
            --args
            -c "echo ${{ steps.cfg.outputs.b64 }} | base64 -d > /tmp/config.yaml && axolotl train /tmp/config.yaml"

      # 2) Now that the job is provisioned, poll its status to a terminal state,
      #    streaming logs. Fails the step on FAILED/CANCELLED or poll timeout.
      #    `timeout` here is a poll ceiling in SECONDS (vs the submit `timeout`
      #    above, which is the Job's own run timeout).
      - name: Wait for fine-tune
        id: wait
        uses: ./actions/wait-for-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}
          stream-logs: true
          poll-interval: 10
          timeout: 3600

      # 3) If the run is cancelled, cancel the Nebius Job too.
      - name: Cancel job on workflow cancellation
        if: cancelled() && steps.submit.outputs.job-id != ''
        uses: ./actions/cancel-job
        with:
          job-id: ${{ steps.submit.outputs.job-id }}

      # Read step outputs via env (not ${{ }} inlined into the script body) so
      # values expand in the shell — the injection-safe pattern.
      - name: Report result
        env:
          JOB_ID: ${{ steps.submit.outputs.job-id }}
          STATUS: ${{ steps.wait.outputs.status }}
          EXIT_CODE: ${{ steps.wait.outputs.exit-code }}
        run: |
          echo "Job ID:    $JOB_ID"
          echo "Status:    $STATUS"
          echo "Exit code: $EXIT_CODE"
