# Single workflow for this repo: verify every change, and automate releases.
#
#   verify          — lint, typecheck, test, build, and a dist-drift gate; runs
#                     on every PR and on every push to main.
#   release-please  — runs only on push to main, AFTER verify passes. It keeps a
#                     "Release PR" up to date (CHANGELOG.md + version bump derived
#                     from Conventional Commits). Merging that PR cuts the release:
#                     it tags `vX.Y.Z`, publishes a GitHub Release, and then this
#                     job force-moves the FLOATING MAJOR tag (e.g. `v0`) to the
#                     release commit so consumers of `@v0` get it.
#
# Why the major-tag move lives here (not in a tag-triggered workflow): a tag
# pushed with the default GITHUB_TOKEN does NOT trigger other workflows, so doing
# it in the same job avoids needing a PAT.
name: Release

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs; never cancel a main/release run.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify:
    name: lint · typecheck · test · build · dist-drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Third-party actions are pinned to a full commit SHA (version in comment)
      # so a moved tag can't swap the code under us. Dependabot bumps these.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Match the actions' runtime: action.yml declares `using: node24`.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build action bundles
        run: npm run build

      # DIST DRIFT CHECK — the committed actions/<name>/dist bundles must match a
      # fresh build (actions run from committed dist, not from an npm install).
      - name: Verify committed dist is up to date (dist drift check)
        run: |
          git diff --exit-code -- actions
          if [ -n "$(git status --porcelain -- actions)" ]; then
            echo "::error::Committed dist/ is out of date. Run 'npm run build' and commit the changes under actions/."
            git status --porcelain -- actions
            exit 1
          fi

  release-please:
    name: Release Please
    needs: verify
    # Only manage releases from main pushes (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create release tags/releases; push the floating major tag
      pull-requests: write # open/update the Release PR
    steps:
      # Reads release-please-config.json + .release-please-manifest.json (defaults).
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1

      # The steps below run ONLY when a release was actually cut (Release PR
      # merged). `verify` already re-checked dist for this commit, so we just move
      # the floating major tag to the release commit.
      - name: Checkout (for tag move)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history + tags to create/move the major tag

      - name: Move and push floating major tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          MAJOR: ${{ steps.release.outputs.major }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # (Re)create the major tag (e.g. v0) at the exact release commit.
          git tag -f -a "v${MAJOR}" "${RELEASE_SHA}" \
            -m "Release ${RELEASE_TAG}: move floating major tag v${MAJOR}"
          git push -f origin "refs/tags/v${MAJOR}"
          echo "Moved 'v${MAJOR}' -> ${RELEASE_SHA} (from ${RELEASE_TAG})"
