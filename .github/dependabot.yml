# Dependabot keeps dependencies (and the SHA-pinned third-party actions in our
# workflows) current automatically, so pinning to a commit SHA does not mean
# silently running stale, vulnerable versions.
version: 2
updates:
  # Bumps the SHA pins in .github/workflows/*.yml (e.g. actions/checkout).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Bumps runtime + dev dependencies in package.json / package-lock.json.
  # Note: an npm bump that changes a bundled runtime dep also changes the
  # committed dist/, so the CI dist-drift check will fail until `npm run build`
  # is re-run and committed.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      # Keep PR noise low: batch routine dev-tooling bumps together.
      dev-dependencies:
        dependency-type: development
